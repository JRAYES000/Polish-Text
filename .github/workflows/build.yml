name: Build Windows EXE

# Déclenche la compilation :
#  - automatiquement quand tu pousses un tag de version (ex. v1.0.1)
#    -> publie l'exe dans une "Release" téléchargeable (utilisé par l'auto-update)
#  - manuellement depuis l'onglet Actions (bouton "Run workflow")
#    -> dépose l'exe en "artifact" téléchargeable
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Lancer les tests (bloque le build si échec)
        run: python test_core.py

      - name: Compiler l'exécutable
        run: pyinstaller --noconfirm --onefile --windowed --name TextEnhancerAI main.py

      - name: Déposer l'exe en artifact (téléchargeable depuis Actions)
        uses: actions/upload-artifact@v4
        with:
          name: TextEnhancerAI
          path: dist/TextEnhancerAI.exe

      - name: Publier dans une Release (sur tag v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TextEnhancerAI.exe
          generate_release_notes: true
