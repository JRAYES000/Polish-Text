name: Build Windows EXE

# Déclenche la compilation :
#  - automatiquement quand tu pousses un tag de version (ex. v1.4.0)
#    -> publie l'exe ET l'installeur dans une "Release" téléchargeable
#  - manuellement depuis l'onglet Actions ("Run workflow") -> artifacts
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Lancer les tests (bloque le build si échec)
        run: python test_core.py

      - name: Compiler l'exécutable
        run: pyinstaller --noconfirm --onefile --windowed --name TextEnhancerAI main.py

      - name: Installer Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compiler l'installeur
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          if ($ver -notmatch '^[0-9]') { $ver = "0.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" installer.iss

      - name: Déposer les artifacts (téléchargeables depuis Actions)
        uses: actions/upload-artifact@v4
        with:
          name: TextEnhancerAI
          path: |
            dist/TextEnhancerAI.exe
            installer_output/TextEnhancerAI-Setup.exe

      - name: Publier dans une Release (sur tag v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TextEnhancerAI.exe
            installer_output/TextEnhancerAI-Setup.exe
          generate_release_notes: true
